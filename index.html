<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CareConnect" />
  <title>CareConnect</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- ╔══════════════════════════════════╗
       ║         LOGIN SCREEN             ║
       ╚══════════════════════════════════╝ -->
  <div id="screen-login" class="screen active" role="main" aria-label="Login">
    <div class="login-bg" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div class="login-wrap">
      <!-- Brand -->
      <div class="login-brand">
        <div class="brand-icon">
          <!-- Replace with your logo SVG or <img> -->
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="24" fill="#4ecdc4"/>
            <path d="M24 12C18.48 12 14 16.48 14 22C14 27.52 18.48 34 24 36C29.52 34 34 27.52 34 22C34 16.48 29.52 12 24 12Z" fill="white" opacity="0.9"/>
            <path d="M21 22H18V25H21V28H24V25H27V22H24V19H21V22Z" fill="#4ecdc4"/>
          </svg>
        </div>
        <h1 class="brand-name">CareConnect</h1>
        <p class="brand-tagline">Support · Simplify · Care</p>
      </div>

      <!-- Login Card -->
      <div class="login-card">
        <h2 class="login-title">Welcome back</h2>
        <p class="login-sub">Sign in to continue</p>

        <div id="login-error" class="alert alert-error hidden" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="input-email">Email</label>
          <input class="form-input" type="email" id="input-email"
                 placeholder="you@example.com" autocomplete="email"
                 inputmode="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="input-password">Password</label>
          <div class="input-icon-wrap">
            <input class="form-input" type="password" id="input-password"
                   placeholder="••••••••" autocomplete="current-password" />
            <button class="input-icon-btn" id="pw-toggle" type="button"
                    aria-label="Toggle password visibility">
              <!-- Eye icon - swapped by Auth module -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button id="btn-login" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden" aria-hidden="true"></span>
        </button>

        <!-- Biometric (shown by Auth module if supported + credential stored) -->
        <div id="biometric-wrap" class="hidden">
          <div class="or-divider"><span>or</span></div>
          <button id="btn-biometric" class="btn btn-outline btn-full">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
              <path d="M12 1a5 5 0 0 1 5 5v3M7 6a5 5 0 0 1 5-5M12 12v.01M8.5 15a4.5 4.5 0 0 0 7 0M6 10a6 6 0 0 0 12 0"/>
            </svg>
            <span id="biometric-label">Fingerprint / Face ID</span>
          </button>
        </div>

        <div class="login-footer">
          <button class="link-btn" id="btn-bug-login">🐛 Report a problem</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ╔══════════════════════════════════╗
       ║           APP SHELL              ║
       ╚══════════════════════════════════╝ -->
  <div id="screen-app" class="screen hidden" role="application" aria-label="CareConnect App">

    <!-- Top Bar -->
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <button class="icon-btn" id="btn-sidebar-toggle" aria-label="Toggle menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button class="icon-btn notif-btn" id="btn-notifications" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge hidden" id="notif-badge" aria-label="unread notifications">0</span>
        </button>
        <button class="avatar avatar-sm" id="btn-user-avatar" aria-label="Account">
          <span id="user-initials" aria-hidden="true">?</span>
        </button>
      </div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay hidden" id="sidebar-overlay" aria-hidden="true"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-header">
        <div class="sidebar-brand" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none" width="28" height="28"><circle cx="24" cy="24" r="24" fill="#4ecdc4"/><path d="M24 12C18.48 12 14 16.48 14 22C14 27.52 18.48 34 24 36C29.52 34 34 27.52 34 22C34 16.48 29.52 12 24 12Z" fill="white" opacity="0.9"/><path d="M21 22H18V25H21V28H24V25H27V22H24V19H21V22Z" fill="#4ecdc4"/></svg>
          <span>CareConnect</span>
        </div>
        <button class="icon-btn" id="btn-sidebar-close" aria-label="Close menu">✕</button>
      </div>
      <!-- User info -->
      <div class="sidebar-user">
        <div class="avatar avatar-md sidebar-avatar" id="sidebar-avatar" aria-hidden="true">
          <span id="sidebar-initials">?</span>
        </div>
        <div class="sidebar-user-info">
          <p class="sidebar-user-name" id="sidebar-name">Loading…</p>
          <span class="role-badge" id="sidebar-role-badge">staff</span>
        </div>
      </div>
      <!-- Nav items injected here by Nav component -->
      <ul class="sidebar-nav" id="sidebar-nav" role="list"></ul>
      <!-- Footer actions -->
      <div class="sidebar-footer">
        <button class="sidebar-footer-btn" id="btn-bug-sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          Report a Bug
        </button>
        <button class="sidebar-footer-btn danger" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign Out
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="main-content" id="main-content" role="main" aria-live="polite">
      <div class="page-loading"><div class="spinner" role="status" aria-label="Loading"></div></div>
    </main>

    <!-- Bottom Nav (mobile) — injected by Nav component -->
    <nav class="bottom-nav" id="bottom-nav" aria-label="Bottom navigation"></nav>
  </div>

  <!-- ╔══════════════════════════════════╗
       ║         GLOBAL UI SLOTS          ║
       ╚══════════════════════════════════╝ -->

  <!-- Modal mount point — controlled by Modal component -->
  <div id="modal-root" aria-modal="true" role="dialog" aria-hidden="true"></div>

  <!-- Toast container — controlled by Toast component -->
  <div id="toast-root" aria-live="assertive" aria-atomic="true"></div>

  <!-- ╔══════════════════════════════════╗
       ║           SCRIPTS                ║
       ╚══════════════════════════════════╝ -->
  <!-- PocketBase SDK (pinned version) -->
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.1/dist/pocketbase.umd.js"></script>
  <!-- EmailJS (bug reports) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Core: load order matters -->
  <script src="core/config.js"></script>     <!-- 1. Configuration constants -->
  <script src="core/events.js"></script>     <!-- 2. Event bus (pub/sub) -->
  <script src="core/state.js"></script>      <!-- 3. Reactive state store -->
  <script src="core/api.js"></script>        <!-- 4. PocketBase data layer -->
  <script src="core/auth.js"></script>       <!-- 5. Authentication + biometrics -->
  <script src="core/router.js"></script>     <!-- 6. Hash-based router with guards -->

  <!-- Reusable UI components -->
  <script src="components/toast.js"></script>
  <script src="components/modal.js"></script>
  <script src="components/nav.js"></script>
  <script src="components/bugReport.js"></script>

  <!-- Pages (self-contained modules, registered on load) -->
  <script src="pages/dashboard.js"></script>
  <script src="pages/roster.js"></script>
  <script src="pages/reports.js"></script>
  <script src="pages/messaging.js"></script>
  <script src="pages/account.js"></script>
  <script src="pages/settings.js"></script>

  <!-- Boot: must be last -->
  <script src="core/app.js"></script>
</body>
</html>
